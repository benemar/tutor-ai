<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TelecomLab">
<link rel="manifest" href="manifest.json">
<title>TelecomLab - Tutor AI</title>

<style>
:root {
  --bg: #0a0e1a; --bg2: #161e2d; --accent: #00d4ff; 
  --text: #e0e6ed; --text-dim: #94a3b8; --border: #2d3748; --card: #1e293b;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  overflow: hidden; height: 100vh; width: 100vw;
}

.screen {
  position: absolute; inset: 0; display: none;
  flex-direction: column; background: var(--bg); padding-top: env(safe-area-inset-top);
}
.screen.active { display: flex; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.header {
  padding: 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.title { font-weight: 800; font-size: 1.2rem; color: var(--accent); }

.content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }

/* Topic Grid */
.topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 10px; }
.topic-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
  padding: 24px 16px; text-align: center; transition: all 0.2s;
}
.topic-card:active { transform: scale(0.96); }
.topic-icon { font-size: 2rem; margin-bottom: 12px; display: block; }

/* Exercise Card */
.ex-card {
  background: var(--card); border-radius: 24px; padding: 24px; position: relative;
  border: 1px solid var(--border); margin-bottom: 15px;
}
.ex-number { position: absolute; top: -12px; left: 20px; background: var(--accent); color: var(--bg); font-weight: 900; padding: 4px 12px; border-radius: 10px; font-size: 0.8rem; }
.ex-question { font-size: 1.1rem; font-weight: 600; line-height: 1.5; margin: 15px 0; }

/* Box a comparsa */
.ex-toggle-box {
  background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px;
  color: var(--accent); margin-top: 10px; display: none; 
  border: 1px dashed var(--accent); cursor: pointer;
}
.ex-formula { font-family: monospace; text-align: center; font-size: 1.1rem; }
.ex-theory { color: var(--text); font-size: 0.9rem; line-height: 1.4; }

/* Area Foto/Circuito Ampliata */
.cam-area {
  background: var(--bg2); border: 2px dashed var(--border); border-radius: 24px;
  flex: 1; min-height: 350px; display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden; margin-bottom: 20px;
}
#cam-preview, #photo-review { width: 100%; height: 100%; object-fit: contain; }

/* Animazione Caricamento */
.loading-pips { display: flex; gap: 8px; justify-content: center; margin: 20px 0; }
.pip { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; opacity: 0.3; animation: pip 1s infinite alternate; }
.pip:nth-child(2) { animation-delay: 0.2s; }
.pip:nth-child(3) { animation-delay: 0.4s; }
@keyframes pip { to { opacity: 1; transform: scale(1.2); } }

/* Buttons */
.btn {
  padding: 18px; border-radius: 18px; border: none; font-weight: 700; font-size: 1rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
}
.btn-small { padding: 8px 14px; font-size: 0.75rem; width: auto; margin: 5px auto; }
.btn-glow { background: var(--accent); color: var(--bg); }
.btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
.btn-stack { display: flex; flex-direction: column; gap: 12px; margin-top: auto; }
</style>
</head>
<body>

<div class="screen active" id="screen-home">
  <div class="header"><div class="title">TelecomLab AI</div></div>
  <div class="content">
    <h2>Esercitazione</h2>
    <div class="topic-grid" id="topic-list"></div>
  </div>
</div>

<div class="screen" id="screen-exercise">
  <div class="header">
    <button style="background:none; border:none; color:var(--text); font-size:1.5rem;" onclick="showScreen('screen-home')">✕</button>
    <div class="title">Esercizio</div>
    <div style="width:30px"></div>
  </div>
  <div class="content">
    <div class="ex-card">
      <div class="ex-number" id="ex-number">#--</div>
      <div id="ex-question" class="ex-question"></div>
      
      <div id="help-section" style="text-align:center; display:flex; flex-direction:column; gap:5px;">
        <button class="btn btn-outline btn-small" id="btn-show-formula" onclick="toggleElement('ex-formula', 'btn-show-formula')">👁️ Suggerimento Formula</button>
        <div class="ex-toggle-box ex-formula" id="ex-formula" onclick="toggleElement('ex-formula', 'btn-show-formula')"></div>

        <button class="btn btn-outline btn-small" id="btn-show-theory" onclick="toggleElement('ex-theory', 'btn-show-theory')">📚 Ripassa i Concetti</button>
        <div class="ex-toggle-box ex-theory" id="ex-theory" onclick="toggleElement('ex-theory', 'btn-show-theory')"></div>
      </div>
    </div>

    <div id="ex-img-container" style="display:none; margin-bottom: 20px; text-align:center;">
        <img id="ex-img" src="" style="max-width:100%; border-radius:18px; border:1px solid var(--border);">
    </div>

    <div class="btn-stack">
      <button class="btn btn-glow" onclick="showScreen('screen-camera')">📷 Risolvi e Fotografa</button>
      <button class="btn btn-outline" onclick="newExercise()">↺ Prova un altro</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-camera">
  <div class="header">
    <button style="background:none; border:none; color:var(--text);" onclick="showScreen('screen-exercise')">Indietro</button>
    <div class="title">Invia Soluzione</div>
    <div style="width:50px"></div>
  </div>
  <div class="content">
    <div class="cam-area" onclick="document.getElementById('file-input').click()">
      <video id="cam-preview" autoplay playsinline></video>
      <img id="photo-review" style="display:none">
      <div id="cam-placeholder" style="position:absolute; text-align:center; pointer-events:none;">
        <span style="font-size:3rem;">📸</span>
        <p style="color:var(--text-dim);">Tocca per scattare</p>
      </div>
    </div>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handleFile(event)">
    <div class="btn-stack">
      <button id="btn-send" class="btn btn-glow" onclick="analyzePhoto()" style="display:none;">✨ Verifica Soluzione</button>
      <button class="btn btn-outline" onclick="resetCamera()">Riprova scatto</button>
    </div>
  </div>
</div>

<div class="screen" id="screen-result">
  <div class="header"><div class="title">Risultato AI</div></div>
  <div class="content">
    <div id="result-card" class="ex-card">
      <div id="ai-status" style="font-weight:900; font-size:1.3rem; margin-bottom:10px;">Analisi...</div>
      <div id="ai-feedback" style="line-height:1.6;"></div>
      <div id="ai-correction" style="margin-top:15px; padding-top:15px; border-top:1px solid var(--border); display:none;"></div>
    </div>
    <div class="loading-pips" id="result-loader" style="display:none;">
      <div class="pip"></div><div class="pip"></div><div class="pip"></div>
    </div>
    <button class="btn btn-glow" onclick="showScreen('screen-home')" id="btn-result-home">Torna alla Home</button>
  </div>
</div>

<script>
const state = { exercises: {}, selectedTopic: null, currentExercise: null, stream: null, photoData: null };

async function init() {
  try {
    const res = await fetch('esercizi.json');
    const data = await res.json();
    state.exercises = data.exercises;
    const list = document.getElementById('topic-list');
    list.innerHTML = data.topics.map(t => `
      <div class="topic-card" onclick="selectTopic('${t.id}')">
        <span class="topic-icon">${t.icon}</span>
        <span class="topic-name">${t.name}</span>
      </div>
    `).join('');
  } catch (err) { console.error("Errore caricamento JSON"); }
}

function selectTopic(id) { state.selectedTopic = id; newExercise(); }

function newExercise() {
  const pool = state.exercises[state.selectedTopic];
  const ex = pool[Math.floor(Math.random() * pool.length)];
  state.currentExercise = ex;
  
  document.getElementById('ex-number').textContent = '#' + ex.id;
  document.getElementById('ex-question').innerHTML = ex.question;
  
  // Gestione Formula
  const fEl = document.getElementById('ex-formula');
  const fBtn = document.getElementById('btn-show-formula');
  fEl.style.display = 'none';
  if (ex.formula) { 
    fEl.textContent = ex.formula; 
    fBtn.style.display = 'block'; 
  } else { fBtn.style.display = 'none'; }

  // Gestione Teoria (Concetti dal campo 'hint' del JSON)
  const tEl = document.getElementById('ex-theory');
  const tBtn = document.getElementById('btn-show-theory');
  tEl.style.display = 'none';
  if (ex.hint) { 
    tEl.innerHTML = `<strong>Concetti chiave:</strong><br>${ex.hint}`; 
    tBtn.style.display = 'block'; 
  } else { tBtn.style.display = 'none'; }

  // Immagine Circuito
  const imgCont = document.getElementById('ex-img-container');
  const img = document.getElementById('ex-img');
  if (ex.image) { img.src = ex.image; imgCont.style.display = 'block'; }
  else { imgCont.style.display = 'none'; }
  
  showScreen('screen-exercise');
}

function toggleElement(elementId, buttonId) {
  const el = document.getElementById(elementId);
  const btn = document.getElementById(buttonId);
  const isHidden = el.style.display === 'none';
  el.style.display = isHidden ? 'block' : 'none';
  btn.style.display = isHidden ? 'none' : 'block';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-camera') startCamera(); else stopCamera();
}

async function startCamera() {
  resetCamera();
  try {
    state.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    document.getElementById('cam-preview').srcObject = state.stream;
  } catch (e) { console.log("Cam non disponibile"); }
}

function stopCamera() { if (state.stream) state.stream.getTracks().forEach(t => t.stop()); }

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => { state.photoData = ev.target.result; showReview(); };
  reader.readAsDataURL(file);
}

function showReview() {
  document.getElementById('cam-preview').style.display = 'none';
  document.getElementById('cam-placeholder').style.display = 'none';
  const rev = document.getElementById('photo-review');
  rev.src = state.photoData;
  rev.style.display = 'block';
  document.getElementById('btn-send').style.display = 'flex';
}

function resetCamera() {
  state.photoData = null;
  document.getElementById('cam-preview').style.display = 'block';
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('photo-review').style.display = 'none';
  document.getElementById('btn-send').style.display = 'none';
}

async function analyzePhoto() {
  showScreen('screen-result');
  const status = document.getElementById('ai-status');
  const feedback = document.getElementById('ai-feedback');
  const correction = document.getElementById('ai-correction');
  const loader = document.getElementById('result-loader');
  const btnHome = document.getElementById('btn-result-home');

  status.textContent = "⚡ Analisi AI...";
  feedback.textContent = "Analisi dei calcoli in corso...";
  correction.style.display = 'none';
  loader.style.display = 'flex';
  btnHome.style.display = 'none';

  const msgCycle = ["Verifica formule...", "Controllo calcoli...", "Confronto risultati..."];
  let mIdx = 0;
  const timer = setInterval(() => { feedback.textContent = msgCycle[mIdx % 3]; mIdx++; }, 2000);

  try {
    const optimized = await getOptimizedImage(state.photoData);
    const res = await fetch('/api/ai_checker', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ problem: state.currentExercise.question, image: optimized })
    });
    const data = await res.json();
    
    clearInterval(timer);
    loader.style.display = 'none';
    btnHome.style.display = 'flex';

    status.textContent = data.isCorrect ? "✅ CORRETTO" : "❌ DA RIVEDERE";
    feedback.innerHTML = `<strong>Feedback:</strong><br>${data.feedback}`;
    
    if (data.correction && data.correction !== data.feedback) {
      correction.style.display = 'block';
      correction.innerHTML = `<strong>Procedura Corretta:</strong><br>${data.correction}`;
    }
  } catch (err) {
    clearInterval(timer);
    loader.style.display = 'none';
    btnHome.style.display = 'flex';
    status.textContent = "⚠️ ERRORE";
    feedback.textContent = "Connessione fallita.";
  }
}

async function getOptimizedImage(base64Str) {
  return new Promise((resolve) => {
    const img = new Image();
    img.src = base64Str;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1024;
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round((h * MAX) / w); w = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
  });
}

init();
</script>
</body>
</html>
